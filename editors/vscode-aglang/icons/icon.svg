<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1a1a2e"/>

  <!-- Hexagon shape representing architecture/structure -->
  <polygon points="64,18 98,37 98,75 64,94 30,75 30,37" fill="none" stroke="#6c63ff" stroke-width="4"/>

  <!-- Inner shield/gate lines representing guardrails -->
  <line x1="30" y1="56" x2="98" y2="56" stroke="#6c63ff" stroke-width="2" stroke-dasharray="5,4"/>

  <!-- "ag" text -->
  <text x="64" y="72" font-family="'Courier New', monospace" font-size="26" font-weight="bold"
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle">ag</text>

  <!-- Small Z3 indicator dot bottom-right -->
  <circle cx="92" cy="92" r="14" fill="#6c63ff"/>
  <text x="92" y="93" font-family="'Courier New', monospace" font-size="11" font-weight="bold"
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Z3</text>
</svg>
